<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="趣味・経験・生活スタイルから、気になる部屋を自分で歩くコミュニティSNS。" />
    <title>Kit Gaw</title>
    <link rel="stylesheet" href="./style.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="app-shell">
      <section id="screen-home" class="screen" aria-hidden="false">
        <div class="entry-content">
          <h1>Kit Gaw</h1>

          <p class="service-description">
            趣味・経験・生活スタイルから、<br />
            気になる部屋を自分で歩く<br />
            コミュニティSNS。
          </p>

          <p class="concept-copy">人を探すな。場を探せ。</p>

          <button id="explore-button" class="primary-button" type="button">
            部屋を歩いてみる
          </button>
        </div>
      </section>

      <section id="screen-explore" class="screen" hidden aria-hidden="true">
        <div class="placeholder-content">
          <h2>部屋を探す</h2>

          <button id="back-button" class="secondary-button" type="button">
            入口へ戻る
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
